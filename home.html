<!doctype html>
<html lang="kr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <style>
            body {
                height: 100vh;
                margin: 0px;

                font-family:
                    system-ui,
                    -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    Roboto,
                    Oxygen,
                    Ubuntu,
                    Cantarell,
                    "Open Sans",
                    "Helvetica Neue",
                    sans-serif;
            }
            h2 {
                font-size: xx-large;
                font-weight: 700;
            }
            header {
                height: 100px;
                background-color: gold;
                padding: 20px;
            }
            section {
                margin-bottom: 40px;
            }
            .container {
                font-size: 30px;
                font-weight: bold;

                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            search {
                margin-left: 20px;
                margin-right: 20px;
                height: 70px;
                background-color: white;
                border-radius: 50px;

                display: flex;
                justify-content: space-around;
                align-items: center;

                box-shadow: 0px 10px 20px rgba(0, 0, 0, 0.2);

                margin-top: -35px;
            }
            main {
                margin: 20px;
            }
            .search-bar {
                width: 100%;
                padding: 0px 20px;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .search-bar input {
                border: none;
                outline: none;
                background-color: transparent;
                color: rgba(0, 0, 0, 0.9);
            }
            #book-of-the-day {
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
            }
            #book-of-the-day img {
                height: 230px;
                border-radius: 10px;
            }
            .book-infos {
                width: 60%;
            }
            .book-name {
                margin: 0px;
                font-size: 30px;
            }
            .book-author {
                color: rgba(0, 0, 0, 0.2);
            }

            .bookmark-box {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .bookmark {
                width: 35px;
                height: 35px;
                background-color: gold;
                border-radius: 50%;

                display: flex;
                justify-content: center;
                align-items: center;
            }
            button {
                height: 40px;
                width: 150px;
                color: white;
                background-color: black;
                font-size: 12px;
                border-radius: 5px;
            }
            .books {
                display: flex;
                overflow: auto;
            }
            .bookcard {
                margin: 0px 20px 20px 0px;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
            }
            .bookcard img {
                width: 80px;
                border-radius: 10px;
            }
            .popular-author-box {
                display: flex;
                column-gap: 50px;
                align-items: start;
                justify-content: start;
            }
            .author-info-box {
                display: flex;
                flex-direction: column;
                justify-content: start;
                align-items: start;
            }
            .popular-author-box img {
                width: 150px;
                border-radius: 12px;
            }
            .popular-author-box p:first-child {
                margin: 0px;
                font-weight: bold;
                font-size: 30px;
            }
            .popular-author-box p:nth-child(2) {
                color: gray;
                font-size: 20px;
            }
            .tags {
                margin: 0px;
                display: flex;
                justify-content: flex-start;
                align-items: center;
                gap: 0px 10px;
            }
            .tags p {
                padding: 7px 12px;
                width: 80px;
                background-color: rgba(0, 0, 0, 0.2);
                border-radius: 5px;
                text-align: center;
            }
        </style>
        <script src="https://kit.fontawesome.com/df924d28ae.js" crossorigin="anonymous"></script>
    </head>
    <body>
        <header class="container">
            <i class="fa-solid fa-bars"></i>
            <span>library</span>
            <i class="fa-solid fa-basket-shopping"></i>
        </header>
        <search>
            <div class="search-bar">
                <input type="search" placeholder="Search books..." />
                <i class="fa-solid fa-magnifying-glass" style="color: rgb(30, 48, 80)"></i>

                            <i class="fa-regular fa-star" style="color: rgb(180, 177, 177)"></i>
                        </p>
                        <div class="tags">
                            <p>Journey</p>
                            <p>Biography</p>
                        </div>
                        <div class="bookmark-box">
                            <div class="bookmark"><i class="fa-solid fa-bookmark"></i></div>
